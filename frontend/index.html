<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Research Agent</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #080b0f;
            --surface: #0e1318;
            --border: #1e2730;
            --accent: #00e5ff;
            --green: #00ff88;
            --yellow: #ffd166;
            --red: #ff4d6d;
            --purple: #c084fc;
            --paper: #818cf8;
            --text: #dce8f0;
            --muted: #4a6070;
            --font-heading: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
        }

        .header-tag {
            font-size: 0.72rem;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-tag::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 1px;
            background: var(--accent);
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            line-height: 1.1;
            color: #fff;
            margin-bottom: 12px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 36px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 24px;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-mono);
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Mode toggle */
        .mode-toggle {
            display: flex;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            width: fit-content;
        }

        .mode-btn {
            padding: 10px 24px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            background: var(--surface);
            color: var(--muted);
        }

        .mode-btn.active-research {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            border-right: 1px solid var(--border);
        }

        .mode-btn.active-quick {
            background: rgba(192, 132, 252, 0.1);
            color: var(--purple);
        }

        .mode-btn:not(.active-research):not(.active-quick):hover {
            color: var(--text);
        }

        /* Query type badge */
        .qtype-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .qtype-market {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--accent);
        }

        .qtype-concept {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--green);
        }

        .qtype-research {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.3);
            color: var(--paper);
        }

        .qtype-mixed {
            background: rgba(255, 209, 102, 0.1);
            border: 1px solid rgba(255, 209, 102, 0.3);
            color: var(--yellow);
        }

        /* Suggest banner */
        .suggest-banner {
            padding: 10px 16px;
            background: rgba(192, 132, 252, 0.08);
            border: 1px solid var(--purple);
            border-radius: 5px;
            color: var(--purple);
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .suggest-btn {
            padding: 4px 14px;
            background: rgba(192, 132, 252, 0.15);
            border: 1px solid var(--purple);
            border-radius: 3px;
            color: var(--purple);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            cursor: pointer;
        }

        .suggest-btn:hover {
            background: rgba(192, 132, 252, 0.25);
        }

        /* Search bar */
        .search-wrap {
            display: flex;
            margin-bottom: 36px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .search-wrap.quick-mode {
            border-color: rgba(192, 132, 252, 0.4);
        }

        .search-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.08);
        }

        .search-wrap.quick-mode:focus-within {
            border-color: var(--purple);
            box-shadow: 0 0 0 2px rgba(192, 132, 252, 0.08);
        }

        input {
            flex: 1;
            padding: 16px 20px;
            background: var(--surface);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border: none;
            outline: none;
        }

        input::placeholder {
            color: var(--muted);
        }

        button.run-btn {
            padding: 16px 28px;
            background: var(--accent);
            color: #000;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        button.run-btn.quick {
            background: var(--purple);
        }

        button.run-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button.run-btn:hover:not(:disabled) {
            opacity: 0.85;
        }

        /* Phases */
        .phases {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .phase {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            padding: 5px 12px;
            border-radius: 3px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: var(--surface);
            transition: all 0.3s;
        }

        .phase.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 229, 255, 0.06);
            animation: pulse 1.2s ease-in-out infinite;
        }

        .phase.done {
            border-color: var(--green);
            color: var(--green);
            background: rgba(0, 255, 136, 0.06);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.6
            }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 28px;
            margin-bottom: 20px;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card-label {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .card-label.green {
            color: var(--green);
        }

        .card-label.green::after {
            background: rgba(0, 255, 136, 0.15);
        }

        .card-label.paper {
            color: var(--paper);
        }

        .card-label.paper::after {
            background: rgba(129, 140, 248, 0.15);
        }

        .card-label.yellow {
            color: var(--yellow);
        }

        .card-label.yellow::after {
            background: rgba(255, 209, 102, 0.15);
        }

        .card-label.red {
            color: var(--red);
        }

        .card-label.red::after {
            background: rgba(255, 77, 109, 0.15);
        }

        /* Market — company grid */
        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .company-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 18px;
            transition: border-color 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .company-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .company-name {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 6px;
        }

        .company-focus {
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .company-fact {
            font-size: 0.75rem;
            color: var(--green);
            line-height: 1.5;
            margin-bottom: 12px;
            flex: 1;
        }

        /* Concept cards */
        .definition-box {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text);
        }

        .analogy-box {
            background: rgba(255, 209, 102, 0.05);
            border: 1px solid rgba(255, 209, 102, 0.2);
            border-radius: 5px;
            padding: 14px 18px;
            margin-top: 12px;
            font-size: 0.82rem;
            line-height: 1.7;
            color: var(--yellow);
            font-style: italic;
        }

        .how-list {
            list-style: none;
            counter-reset: steps;
        }

        .how-list li {
            counter-increment: steps;
            padding: 12px 0 12px 40px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.6;
            position: relative;
        }

        .how-list li:last-child {
            border: none;
        }

        .how-list li::before {
            content: counter(steps);
            position: absolute;
            left: 0;
            top: 12px;
            width: 24px;
            height: 24px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 50%;
            color: var(--accent);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .component-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }

        .component-card {
            background: var(--bg);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 5px;
            padding: 14px 16px;
        }

        .component-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .component-desc {
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .use-case-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .use-case-tag {
            font-size: 0.75rem;
            padding: 5px 14px;
            background: rgba(0, 255, 136, 0.07);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            color: var(--green);
        }

        .misconception-list {
            list-style: none;
        }

        .misconception-list li {
            padding: 10px 0 10px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            color: var(--muted);
            position: relative;
            line-height: 1.5;
        }

        .misconception-list li::before {
            content: '✗';
            position: absolute;
            left: 0;
            color: var(--red);
            font-weight: 700;
        }

        .misconception-list li:last-child {
            border: none;
        }

        /* Research cards */
        .finding-list {
            list-style: none;
        }

        .finding-list li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.6;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .finding-list li:last-child {
            border: none;
        }

        .benchmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .benchmark-card {
            background: var(--bg);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 5px;
            padding: 14px;
        }

        .benchmark-name {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--paper);
            margin-bottom: 4px;
        }

        .benchmark-result {
            font-size: 0.9rem;
            color: #fff;
            font-weight: 700;
        }

        /* ArXiv paper cards */
        .paper-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .paper-card {
            background: var(--bg);
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: 5px;
            padding: 16px 18px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .paper-card:hover {
            border-color: var(--paper);
            transform: translateY(-1px);
        }

        .paper-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .paper-authors {
            font-size: 0.75rem;
            color: var(--paper);
            margin-bottom: 6px;
        }

        .paper-summary {
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .paper-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .paper-date {
            font-size: 0.68rem;
            color: var(--muted);
        }

        .paper-category {
            font-size: 0.65rem;
            padding: 2px 8px;
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.25);
            border-radius: 3px;
            color: var(--paper);
            text-transform: uppercase;
        }

        .paper-links {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .paper-link {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 3px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .paper-link-abs {
            border: 1px solid rgba(129, 140, 248, 0.3);
            color: var(--paper);
        }

        .paper-link-abs:hover {
            background: rgba(129, 140, 248, 0.1);
        }

        .paper-link-pdf {
            background: rgba(129, 140, 248, 0.15);
            border: 1px solid rgba(129, 140, 248, 0.3);
            color: #fff;
        }

        .paper-link-pdf:hover {
            background: rgba(129, 140, 248, 0.28);
        }

        /* Fact list (shared) */
        .fact-list {
            list-style: none;
        }

        .fact-list li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.6;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .fact-list li:last-child {
            border: none;
        }

        .fact-arrow {
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .fact-body {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .fact-source {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Evidence */
        .evidence {
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .confidence {
            font-size: 0.62rem;
            padding: 2px 7px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .confidence-high {
            background: rgba(0, 255, 136, 0.15);
            color: var(--green);
        }

        .confidence-medium {
            background: rgba(255, 209, 102, 0.15);
            color: var(--yellow);
        }

        .confidence-low {
            background: rgba(255, 77, 109, 0.15);
            color: var(--red);
        }

        .source-link {
            font-size: 0.70rem;
            color: var(--accent);
            text-decoration: none;
            opacity: 0.75;
            transition: opacity 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 190px;
        }

        .source-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Downloads */
        .download-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .dl-btn {
            padding: 8px 22px;
            background: transparent;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
        }

        .dl-btn:active {
            transform: scale(0.97);
        }

        .dl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .dl-btn-txt {
            border: 1px solid var(--green);
            color: var(--green);
        }

        .dl-btn-txt:hover:not(:disabled) {
            background: rgba(0, 255, 136, 0.08);
        }

        .dl-btn-pdf {
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .dl-btn-pdf:hover:not(:disabled) {
            background: rgba(0, 229, 255, 0.08);
        }

        .dl-btn-docx {
            border: 1px solid var(--yellow);
            color: var(--yellow);
        }

        .dl-btn-docx:hover:not(:disabled) {
            background: rgba(255, 209, 102, 0.08);
        }

        .dl-btn-pptx {
            border: 1px solid var(--purple);
            color: var(--purple);
        }

        .dl-btn-pptx:hover:not(:disabled) {
            background: rgba(192, 132, 252, 0.08);
        }

        /* Misc */
        .quick-card {
            background: var(--surface);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 6px;
            padding: 28px;
            margin-bottom: 20px;
            animation: fadeUp 0.4s ease both;
        }

        .quick-label {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--purple);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(192, 132, 252, 0.2);
        }

        .quick-answer {
            white-space: pre-wrap;
            font-size: 0.85rem;
            line-height: 1.9;
            color: var(--text);
        }

        .quick-meta {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--muted);
            display: flex;
            gap: 16px;
        }

        .report-content {
            white-space: pre-wrap;
            font-size: 0.83rem;
            line-height: 1.9;
            color: #bcd0dc;
        }

        .cache-row {
            margin-bottom: 20px;
        }

        .cache-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 0.72rem;
            color: var(--muted);
        }

        .searches {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .search-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: rgba(0, 229, 255, 0.06);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 3px;
            color: var(--accent);
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .error-box {
            padding: 16px 20px;
            background: rgba(255, 77, 109, 0.08);
            border: 1px solid var(--red);
            border-radius: 5px;
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .done-banner {
            padding: 16px 20px;
            background: rgba(0, 255, 136, 0.06);
            border: 1px solid var(--green);
            border-radius: 5px;
            color: var(--green);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .memory-banner {
            padding: 10px 16px;
            background: rgba(255, 209, 102, 0.08);
            border: 1px solid var(--yellow);
            border-radius: 5px;
            color: var(--yellow);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .obs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .obs-stat {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .obs-stat-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .obs-stat-value {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .obs-stat-sub {
            font-size: 0.72rem;
            color: var(--muted);
        }

        .timing-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .timing-label {
            font-size: 0.75rem;
            color: var(--muted);
            width: 70px;
            flex-shrink: 0;
        }

        .timing-bar-wrap {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .timing-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .timing-value {
            font-size: 0.75rem;
            color: var(--text);
            width: 45px;
            text-align: right;
        }

        .topic-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
        }

        .topic-row:last-child {
            border: none;
        }

        .topic-name {
            flex: 1;
            color: var(--text);
        }

        .topic-badge {
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 3px;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: var(--accent);
        }

        .topic-runs {
            font-size: 0.70rem;
            color: var(--muted);
            width: 50px;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 2;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .plain-tag {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: rgba(255, 209, 102, 0.07);
            border: 1px solid rgba(255, 209, 102, 0.2);
            border-radius: 3px;
            color: var(--yellow);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PHASES = [
            { id: 1, label: "01 PLAN" }, { id: 2, label: "02 SEARCH" },
            { id: 3, label: "03 EXTRACT" }, { id: 4, label: "04 CACHE" }, { id: 5, label: "05 REPORT" },
        ];
        const API_BASE = "https://research-agent-heod.onrender.com";

        // ── Downloads ─────────────────────────────────────────────────────────────────
        function downloadTXT(query, report) {
            const blob = new Blob([[`Research Query: ${query}`, `Generated: ${new Date().toLocaleString()}`, "=".repeat(60), "", report].join("\n")], { type: "text/plain" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = query.slice(0, 40).replace(/\s+/g, "_") + ".txt"; a.click();
        }
        function downloadPDF(query, report) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF({ unit: "mm", format: "a4" });
            doc.setFillColor(8, 11, 15); doc.rect(0, 0, 210, 297, "F");
            doc.setFont("helvetica", "bold"); doc.setFontSize(18); doc.setTextColor(0, 229, 255);
            const tl = doc.splitTextToSize(query, 175); doc.text(tl, 15, 20);
            const th = tl.length * 8;
            doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(74, 96, 112);
            doc.text(`Generated: ${new Date().toLocaleString()} · AI Research Agent`, 15, 20 + th + 4);
            doc.setDrawColor(0, 229, 255); doc.setLineWidth(0.3); doc.line(15, 20 + th + 10, 195, 20 + th + 10);
            doc.setFontSize(10); doc.setTextColor(220, 232, 240);
            doc.text(doc.splitTextToSize(report, 180), 15, 20 + th + 18);
            doc.save(query.slice(0, 40).replace(/\s+/g, "_") + ".pdf");
        }
        async function downloadFromBackend(endpoint, query, facts, report, filename) {
            const res = await fetch(`${API_BASE}${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query, facts, report }) });
            if (!res.ok) throw new Error(`Export failed: ${res.status}`);
            const blob = await res.blob(); const a = document.createElement("a");
            a.href = URL.createObjectURL(blob); a.download = filename; a.click();
        }

        // ── Shared components ─────────────────────────────────────────────────────────
        function Evidence({ ev }) {
            if (!ev) return null;
            const conf = ev.confidence || "medium"; const title = ev.source_title || ev.source_url || "";
            return (<div className="evidence">
                <span className={`confidence confidence-${conf}`}>{conf}</span>
                {ev.source_url ? <a className="source-link" href={ev.source_url} target="_blank" rel="noreferrer">↗ {title.slice(0, 38)}{title.length > 38 ? "…" : ""}</a> : null}
            </div>);
        }

        function PaperCard({ paper }) {
            return (<div className="paper-card">
                <div className="paper-title">{paper.title}</div>
                <div className="paper-authors">👤 {paper.authors}</div>
                <div className="paper-summary">{paper.summary}</div>
                <div className="paper-footer">
                    <span className="paper-date">📅 {paper.published}</span>
                    {paper.category && <span className="paper-category">{paper.category}</span>}
                    <div className="paper-links">
                        <a className="paper-link paper-link-abs" href={paper.url} target="_blank" rel="noreferrer">Abstract</a>
                        {paper.pdf_url && <a className="paper-link paper-link-pdf" href={paper.pdf_url} target="_blank" rel="noreferrer">↓ PDF</a>}
                    </div>
                </div>
            </div>);
        }

        // ── Market results ────────────────────────────────────────────────────────────
        function MarketResults({ facts }) {
            const companies = facts.companies || [];
            const mfacts = facts.market_facts || [];
            const challenges = facts.challenges || [];
            return (<>
                {companies.length > 0 && <div className="card">
                    <div className="card-label">Key Companies ({companies.length})</div>
                    <div className="company-grid">
                        {companies.map((c, i) => (
                            <div key={i} className="company-card">
                                <div className="company-name">{c.name}</div>
                                <div className="company-focus">{c.focus}</div>
                                <div className="company-fact">{c.key_fact}</div>
                                <Evidence ev={c.evidence} />
                            </div>
                        ))}
                    </div>
                </div>}
                {mfacts.length > 0 && <div className="card">
                    <div className="card-label">Market Overview</div>
                    <ul className="fact-list">
                        {mfacts.map((f, i) => (
                            <li key={i}><span className="fact-arrow">→</span>
                                <div className="fact-body"><span>{f.fact || f}</span>
                                    {f.evidence && <div className="fact-source"><span className={`confidence confidence-${f.evidence.confidence || "medium"}`}>{f.evidence.confidence}</span>{f.evidence.source_url && <a className="source-link" href={f.evidence.source_url} target="_blank" rel="noreferrer">↗ {(f.evidence.source_title || f.evidence.source_url).slice(0, 45)}</a>}</div>}
                                </div></li>
                        ))}
                    </ul>
                </div>}
                {challenges.length > 0 && <div className="card">
                    <div className="card-label red">Challenges</div>
                    <ul className="fact-list">
                        {challenges.map((c, i) => (
                            <li key={i}><span className="fact-arrow" style={{ color: "var(--red)" }}>→</span>
                                <div className="fact-body"><span>{c.challenge || c}</span>
                                    {c.evidence && <div className="fact-source"><span className={`confidence confidence-${c.evidence.confidence || "medium"}`}>{c.evidence.confidence}</span>{c.evidence.source_url && <a className="source-link" href={c.evidence.source_url} target="_blank" rel="noreferrer">↗ {(c.evidence.source_title || c.evidence.source_url).slice(0, 45)}</a>}</div>}
                                </div></li>
                        ))}
                    </ul>
                </div>}
            </>);
        }

        // ── Concept results ───────────────────────────────────────────────────────────
        function ConceptResults({ facts }) {
            return (<>
                {facts.definition && <div className="card">
                    <div className="card-label green">What It Is</div>
                    <div className="definition-box">{facts.definition}</div>
                    {facts.simple_analogy && <div className="analogy-box">💡 {facts.simple_analogy}</div>}
                </div>}

                {(facts.how_it_works || []).length > 0 && <div className="card">
                    <div className="card-label">How It Works</div>
                    <ol className="how-list">
                        {facts.how_it_works.map((step, i) => <li key={i}>{step}</li>)}
                    </ol>
                </div>}

                {(facts.key_components || []).length > 0 && <div className="card">
                    <div className="card-label">Key Components</div>
                    <div className="component-grid">
                        {facts.key_components.map((c, i) => (
                            <div key={i} className="component-card">
                                <div className="component-name">{c.name}</div>
                                <div className="component-desc">{c.description}</div>
                                {c.evidence?.source_url && <div style={{ marginTop: 8 }}><a className="source-link" href={c.evidence.source_url} target="_blank" rel="noreferrer">↗ {(c.evidence.source_title || c.evidence.source_url).slice(0, 40)}</a></div>}
                            </div>
                        ))}
                    </div>
                </div>}

                {(facts.use_cases || []).length > 0 && <div className="card">
                    <div className="card-label yellow">Use Cases</div>
                    <div className="use-case-grid">
                        {facts.use_cases.map((u, i) => <span key={i} className="use-case-tag">{u}</span>)}
                    </div>
                </div>}

                {(facts.common_misconceptions || []).length > 0 && <div className="card">
                    <div className="card-label red">Common Misconceptions</div>
                    <ul className="misconception-list">
                        {facts.common_misconceptions.map((m, i) => <li key={i}>{m}</li>)}
                    </ul>
                </div>}
            </>);
        }

        // ── Research results ──────────────────────────────────────────────────────────
        function ResearchResults({ facts }) {
            return (<>
                {(facts.key_findings || []).length > 0 && <div className="card">
                    <div className="card-label paper">Key Findings</div>
                    <ul className="finding-list">
                        {facts.key_findings.map((f, i) => (
                            <li key={i}><span className="fact-arrow" style={{ color: "var(--paper)" }}>→</span>
                                <div className="fact-body"><span>{f.finding || f}</span>
                                    {f.evidence && <div className="fact-source"><span className={`confidence confidence-${f.evidence.confidence || "medium"}`}>{f.evidence.confidence}</span>{f.evidence.source_url && <a className="source-link" href={f.evidence.source_url} target="_blank" rel="noreferrer">↗ {(f.evidence.source_title || f.evidence.source_url).slice(0, 45)}</a>}</div>}
                                </div></li>
                        ))}
                    </ul>
                </div>}

                {(facts.benchmarks || []).length > 0 && <div className="card">
                    <div className="card-label yellow">Benchmarks</div>
                    <div className="benchmark-grid">
                        {facts.benchmarks.map((b, i) => (
                            <div key={i} className="benchmark-card">
                                <div className="benchmark-name">{b.name}</div>
                                <div className="benchmark-result">{b.result}</div>
                            </div>
                        ))}
                    </div>
                </div>}

                {(facts.methodologies || []).length > 0 && <div className="card">
                    <div className="card-label green">Methodologies</div>
                    <div className="tag-row">
                        {facts.methodologies.map((m, i) => <span key={i} className="plain-tag">{m}</span>)}
                    </div>
                </div>}

                {(facts.open_problems || []).length > 0 && <div className="card">
                    <div className="card-label red">Open Problems</div>
                    <ul className="fact-list">
                        {facts.open_problems.map((p, i) => (
                            <li key={i}><span className="fact-arrow" style={{ color: "var(--red)" }}>→</span><span>{p}</span></li>
                        ))}
                    </ul>
                </div>}

                {(facts.notable_authors || []).length > 0 && <div className="card">
                    <div className="card-label">Notable Authors</div>
                    <div className="tag-row">
                        {facts.notable_authors.map((a, i) => <span key={i} className="use-case-tag" style={{ borderColor: "rgba(0,229,255,0.3)", color: "var(--accent)" }}>{a}</span>)}
                    </div>
                </div>}
            </>);
        }

        // ── Download row ──────────────────────────────────────────────────────────────
        function DownloadRow({ query, facts, report }) {
            const [dL, setDL] = useState(false); const [pL, setPL] = useState(false);
            async function handleDocx() { setDL(true); try { await downloadFromBackend("/export/docx", query, facts, report, query.slice(0, 40).replace(/\s+/g, "_") + ".docx"); } catch (e) { alert(e.message); } setDL(false); }
            async function handlePptx() { setPL(true); try { await downloadFromBackend("/export/pptx", query, facts, report, query.slice(0, 40).replace(/\s+/g, "_") + ".pptx"); } catch (e) { alert(e.message); } setPL(false); }
            return (<div className="download-row">
                <button className="dl-btn dl-btn-txt" onClick={() => downloadTXT(query, report)}>↓ TXT</button>
                <button className="dl-btn dl-btn-pdf" onClick={() => downloadPDF(query, report)}>↓ PDF</button>
                <button className="dl-btn dl-btn-docx" onClick={handleDocx} disabled={dL}>{dL ? "generating…" : "↓ Word"}</button>
                <button className="dl-btn dl-btn-pptx" onClick={handlePptx} disabled={pL}>{pL ? "generating…" : "↓ PowerPoint"}</button>
            </div>);
        }

        // ── Dashboard ─────────────────────────────────────────────────────────────────
        function TimingBar({ label, value, max }) {
            return (<div className="timing-row">
                <span className="timing-label">{label}</span>
                <div className="timing-bar-wrap"><div className="timing-bar" style={{ width: `${max > 0 ? Math.round(value / max * 100) : 0}%` }} /></div>
                <span className="timing-value">{value}s</span>
            </div>);
        }
        function Dashboard({ runData }) {
            if (!runData) return <div className="empty-state">No run data yet.<br />Run a research query first.</div>;
            const { timings, total_time, total_searches, estimated_cost, memory_topics, papers_found, query_type } = runData;
            const maxT = Math.max(...Object.values(timings || {}), 0.1);
            return (<div>
                <div className="card">
                    <div className="card-label">Run Summary</div>
                    <div className="obs-grid">
                        <div className="obs-stat"><span className="obs-stat-label">Total Time</span><span className="obs-stat-value">{total_time}s</span><span className="obs-stat-sub">end to end</span></div>
                        <div className="obs-stat"><span className="obs-stat-label">Web Searches</span><span className="obs-stat-value">{total_searches}</span><span className="obs-stat-sub">async parallel</span></div>
                        <div className="obs-stat"><span className="obs-stat-label">Papers Found</span><span className="obs-stat-value" style={{ color: "var(--paper)" }}>{papers_found || 0}</span><span className="obs-stat-sub">from ArXiv</span></div>
                        <div className="obs-stat"><span className="obs-stat-label">Query Type</span><span className="obs-stat-value" style={{ fontSize: "1.1rem", textTransform: "uppercase" }}>{query_type || "market"}</span><span className="obs-stat-sub">detected automatically</span></div>
                    </div>
                </div>
                {timings && <div className="card"><div className="card-label">Phase Timings</div>{Object.entries(timings).map(([p, v]) => <TimingBar key={p} label={p} value={v} max={maxT} />)}</div>}
                <div className="card">
                    <div className="card-label">Agent Knowledge Base</div>
                    {!(memory_topics || []).length ? <div style={{ color: "var(--muted)", fontSize: "0.85rem" }}>No topics yet.</div>
                        : (memory_topics || []).map((t, i) => (
                            <div key={i} className="topic-row">
                                <span className="topic-name">{t.topic?.slice(0, 55)}</span>
                                <span className="topic-badge">{t.companies} companies</span>
                                <span className="topic-runs">{t.access_count}× runs</span>
                            </div>
                        ))
                    }
                </div>
            </div>);
        }

        // ── Main App ──────────────────────────────────────────────────────────────────
        function App() {
            const [activeTab, setActiveTab] = useState("research");
            const [searchMode, setSearchMode] = useState("research");
            const [query, setQuery] = useState("");
            const [loading, setLoading] = useState(false);
            const [activePhase, setActivePhase] = useState(0);
            const [donePhases, setDonePhases] = useState([]);
            const [plan, setPlan] = useState(null);
            const [queryType, setQueryType] = useState("market");
            const [facts, setFacts] = useState(null);
            const [papers, setPapers] = useState([]);
            const [report, setReport] = useState("");
            const [cacheStats, setCacheStats] = useState(null);
            const [error, setError] = useState("");
            const [isDone, setIsDone] = useState(false);
            const [memoryHit, setMemoryHit] = useState(null);
            const [runData, setRunData] = useState(null);
            const [quickResult, setQuickResult] = useState(null);
            const [suggestion, setSuggestion] = useState(null);
            const classifyTimer = useRef(null);
            const factsRef = useRef({});

            function reset() {
                setActivePhase(0); setDonePhases([]); setPlan(null);
                setQueryType("market"); setFacts(null); setPapers([]);
                setReport(""); setCacheStats(null); setError("");
                setIsDone(false); setMemoryHit(null);
                setQuickResult(null); setSuggestion(null);
                factsRef.current = {};
            }

            useEffect(() => {
                if (!query.trim() || query.length < 5) { setSuggestion(null); return; }
                clearTimeout(classifyTimer.current);
                classifyTimer.current = setTimeout(async () => {
                    try {
                        const res = await fetch(`${API_BASE}/search/classify`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query: query.trim() }) });
                        const data = await res.json();
                        if (data.type && data.type !== searchMode) setSuggestion(data); else setSuggestion(null);
                    } catch { setSuggestion(null); }
                }, 800);
                return () => clearTimeout(classifyTimer.current);
            }, [query, searchMode]);

            async function runQuickSearch() {
                if (!query.trim() || loading) return;
                reset(); setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/search/quick`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query: query.trim() }) });
                    const data = await res.json();
                    setQuickResult(data); setIsDone(true);
                } catch { setError("Could not connect to backend."); }
                setLoading(false);
            }

            async function runResearch() {
                if (!query.trim() || loading) return;
                reset(); setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/research/stream`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query: query.trim() }) });
                    if (!res.ok) { setError(`Server error: ${res.status}`); setLoading(false); return; }
                    const reader = res.body.getReader(); const decoder = new TextDecoder(); let buffer = "";
                    while (true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const parts = buffer.split("\n\n"); buffer = parts.pop();
                        for (const part of parts) {
                            const line = part.trim(); if (!line.startsWith("data: ")) continue;
                            try {
                                const { event, data } = JSON.parse(line.slice(6));
                                switch (event) {
                                    case "phase":
                                        setActivePhase(data.phase);
                                        setDonePhases(prev => [...new Set([...prev, data.phase - 1])].filter(x => x > 0));
                                        break;
                                    case "plan":
                                        setPlan(data);
                                        if (data.query_type) setQueryType(data.query_type);
                                        break;
                                    case "arxiv_papers": setPapers(data.papers || []); break;
                                    case "facts":
                                        setFacts(data); factsRef.current = data;
                                        if (data.query_type) setQueryType(data.query_type);
                                        break;
                                    case "cache": setCacheStats(data); break;
                                    case "report": setReport(data.content || ""); break;
                                    case "memory_hit": case "memory_merged": setMemoryHit(data); break;
                                    case "done":
                                        setDonePhases([1, 2, 3, 4, 5]); setActivePhase(0);
                                        setIsDone(true); setRunData(data);
                                        break;
                                    case "error": setError(data.message); break;
                                }
                            } catch (e) { console.warn("[SSE]", e); }
                        }
                    }
                } catch (e) { setError("Could not connect to backend."); }
                setLoading(false);
            }

            function handleRun() { searchMode === "quick" ? runQuickSearch() : runResearch(); }

            const qTypeLabel = { market: "🏢 Market", concept: "📖 Concept", research: "🔬 Research", mixed: "🔀 Mixed" };
            const qTypeClass = { market: "qtype-market", concept: "qtype-concept", research: "qtype-research", mixed: "qtype-mixed" };
            const showProgress = loading || donePhases.length > 0;

            return (
                <div className="container">
                    <div className="header">
                        <div className="header-tag">AI Research Agent</div>
                        <h1>Research<br /><span>anything.</span></h1>
                        <p className="subtitle">Web + ArXiv · Powered by OpenAI + Tavily · Built by you</p>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === "research" ? "active" : ""}`} onClick={() => setActiveTab("research")}>Research</button>
                        <button className={`tab ${activeTab === "dashboard" ? "active" : ""}`} onClick={() => setActiveTab("dashboard")}>Observability</button>
                    </div>

                    {activeTab === "research" && (<div>
                        <div className="mode-toggle">
                            <button className={`mode-btn ${searchMode === "research" ? "active-research" : ""}`} onClick={() => { setSearchMode("research"); reset(); }}>🔬 Research</button>
                            <button className={`mode-btn ${searchMode === "quick" ? "active-quick" : ""}`} onClick={() => { setSearchMode("quick"); reset(); }}>⚡ Quick Search</button>
                        </div>

                        <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginBottom: "16px" }}>
                            {searchMode === "research" ? "→ Full agent: web + ArXiv + type-aware extraction · 10-20s" : "→ Instant AI answer · no web search · 3-5s"}
                        </div>

                        {suggestion && (<div className="suggest-banner">
                            <span>{suggestion.type === "quick" ? "⚡ This looks like a quick question — switch to Quick Search?" : "🔬 This looks like a research topic — switch to Research mode?"}</span>
                            <button className="suggest-btn" onClick={() => { setSearchMode(suggestion.type); setSuggestion(null); }}>Switch →</button>
                        </div>)}

                        <div className={`search-wrap ${searchMode === "quick" ? "quick-mode" : ""}`}>
                            <input value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === "Enter" && handleRun()}
                                placeholder={searchMode === "quick" ? "e.g. What is RAG in AI?" : "e.g. AI startups in India 2026  /  how does transformer work  /  latest LLM benchmarks"}
                                disabled={loading} />
                            <button className={`run-btn ${searchMode === "quick" ? "quick" : ""}`} onClick={handleRun} disabled={loading || !query.trim()}>
                                {loading ? <span className="spinner" /> : searchMode === "quick" ? "ASK →" : "RUN →"}
                            </button>
                        </div>

                        {error && <div className="error-box">⚠ {error}</div>}

                        {quickResult && (<div className="quick-card">
                            <div className="quick-label">⚡ Quick Answer</div>
                            <div className="quick-answer">{quickResult.answer}</div>
                            <div className="quick-meta"><span>⏱ {quickResult.time_taken}s</span><span>💰 {quickResult.cost}</span><span style={{ color: "var(--muted)" }}>No web search · AI only</span></div>
                        </div>)}

                        {searchMode === "research" && (<>
                            {showProgress && (<div className="phases">
                                {PHASES.map(p => (
                                    <div key={p.id} className={`phase ${donePhases.includes(p.id) ? "done" : activePhase === p.id ? "active" : ""}`}>
                                        {donePhases.includes(p.id) ? "✓ " : ""}{p.label}
                                    </div>
                                ))}
                            </div>)}

                            {/* Query type badge — shows as soon as plan is received */}
                            {plan && (<div className={`qtype-badge ${qTypeClass[queryType] || "qtype-market"}`}>
                                {qTypeLabel[queryType] || "🏢 Market"} — detected automatically
                            </div>)}

                            {memoryHit && <div className="memory-banner">🧠 {memoryHit.message} — {memoryHit.companies || memoryHit.total_companies} companies in memory</div>}
                            {isDone && report && <div className="done-banner">✓ Research complete — {runData?.total_time}s · ${runData?.estimated_cost} · {runData?.papers_found || 0} papers · type: {queryType}</div>}

                            {plan && (<div className="card">
                                <div className="card-label">Research Plan</div>
                                <div className="searches">{plan.searches.map((s, i) => <span key={i} className="search-tag">{s}</span>)}</div>
                            </div>)}

                            {/* ArXiv papers — always shown when available */}
                            {papers.length > 0 && (<div className="card">
                                <div className="card-label paper">📄 ArXiv Papers ({papers.length})</div>
                                <div className="paper-list">{papers.map((p, i) => <PaperCard key={i} paper={p} />)}</div>
                            </div>)}

                            {/* Type-aware facts rendering */}
                            {facts && queryType === "concept" && <ConceptResults facts={facts} />}
                            {facts && queryType === "research" && <ResearchResults facts={facts} />}
                            {facts && queryType === "market" && <MarketResults facts={facts} />}
                            {facts && queryType === "mixed" && <><ConceptResults facts={facts} /><MarketResults facts={facts} /></>}

                            {cacheStats && (<div className="cache-row">
                                <span className="cache-badge">◆ {cacheStats.cached_queries} cached · {cacheStats.cache_size_kb}kb · {cacheStats.total_topics || 0} topics</span>
                            </div>)}

                            {report && (<div className="card">
                                <div className="card-label">Full Report</div>
                                <div className="report-content">{report}</div>
                                <DownloadRow query={query} facts={factsRef.current} report={report} />
                            </div>)}
                        </>)}
                    </div>)}

                    {activeTab === "dashboard" && <Dashboard runData={runData} />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
